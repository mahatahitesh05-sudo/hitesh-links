<style>

/* BODY */
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(120deg,#74ebd5,#ACB6E5);
overflow-x:hidden;
}

/* BACKGROUND ANIMATION */
.bg span{
position:fixed;
width:20px;height:20px;
background:white;
opacity:.3;
border-radius:50%;
animation:move 25s linear infinite;
}
@keyframes move{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* NAVBAR */
nav{
background:#111;
padding:12px;
text-align:center;
position:sticky;
top:0;
z-index:100;
}
nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}
nav a:hover{color:#00eaff}

/* HERO */
.hero{
text-align:center;
padding:60px 20px;
color:#111;
animation:fade 1s ease;
}
.hero h1{font-size:40px}

/* SOCIAL */
.social{
text-align:center;
padding:20px;
}
.social a{
display:inline-block;
margin:10px;
padding:15px;
font-size:22px;
border-radius:50%;
background:white;
color:#111;
transition:.3s;
}
.social a:hover{
transform:scale(1.2);
background:#00eaff;
}

/* GALLERY */
.gallery{
padding:30px;
text-align:center;
}
.gallery img{
width:250px;
margin:10px;
border-radius:12px;
transition:.3s;
}
.gallery img:hover{
transform:scale(1.05);
}

/* FOOTER */
footer{
background:#111;
color:white;
text-align:center;
padding:10px;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>
