<style>

/* Responsive Gallery */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.gallery-grid img{
  width:100%;
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
}
.gallery-grid img:hover{transform:scale(1.05)}

/* Modal Fullscreen */
.modal{
  display:none;
  position:fixed;
  z-index:999;
  padding-top:60px;
  left:0;top:0;
  width:100%;height:100%;
  background:rgba(0,0,0,.9);
}
.modal-content{
  margin:auto;
  display:block;
  max-width:90%;
  max-height:90%;
}
.close{
  position:absolute;
  top:20px;right:35px;
  color:white;
  font-size:40px;
  cursor:pointer;
}

/* SPOTIFY */
.spotify-box{text-align:center;margin-top:15px}
.spotify-btn{
background:#1db954;color:white;border:none;
padding:12px 18px;font-size:18px;
border-radius:25px;cursor:pointer;transition:.3s;
}
.spotify-btn:hover{background:#159c43;transform:scale(1.05)}
.spotify-menu{display:none;margin-top:10px}
.spotify-menu a{
display:block;margin:6px auto;padding:8px;width:200px;
background:white;color:#111;text-decoration:none;border-radius:10px
}
.spotify-menu a:hover{background:#1db954;color:white}

/* BODY */
body{
margin:0;font-family:Arial;
background:linear-gradient(120deg,#74ebd5,#ACB6E5);
overflow-x:hidden;
}

/* NAVBAR */
nav{
background:#111;padding:12px;text-align:center;
position:sticky;top:0;z-index:100;
}
nav a{
color:white;margin:0 15px;text-decoration:none;font-weight:bold;
}
nav a:hover{color:#00eaff}

/* HERO */
.hero{text-align:center;padding:60px 20px;color:#111}
.hero h1{font-size:40px}

/* SOCIAL */
.social{text-align:center;padding:20px}
.social a{
display:inline-block;margin:10px;padding:15px;
font-size:22px;border-radius:50%;background:white;color:#111;
transition:.3s;
}
.social a:hover{transform:scale(1.2);background:#00eaff}

/* FOOTER */
footer{
background:#111;color:white;text-align:center;padding:10px;
}

</style>
</head>

<script>
document.querySelector(".spotify-btn").onclick=function(){
let menu=document.querySelector(".spotify-menu");

function openModal(img){

function closeModal(){
document.getElementById("imgModal").style.display="none";
}
