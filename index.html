<style>
    /* SPOTIFY MENU DESIGN */
.spotify-menu{
display:none;
margin-top:15px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
}

.music-card{
text-decoration:none;
color:#111;
background:white;
padding:12px 20px;
border-radius:30px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.music-card:hover{
background:#1db954;
color:white;
transform:translateY(-5px) scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.spotify-btn{
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.spotify-btn:hover{
transform:scale(1.1);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.gallery-grid img:hover{
transform:scale(1.08);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.gallery-grid img{
width:100%;
height:250px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
transition:.3s;
}


/* BACKGROUND BUBBLES */
/* GLOW BUBBLES */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.bg span{
position:absolute;
width:25px;
height:25px;
background:rgba(255,255,255,0.6);
border-radius:50%;
box-shadow:0 0 10px white,
           0 0 20px white,
           0 0 40px #00eaff;
animation:move linear infinite;
}

/* Different speed & size */
.bg span:nth-child(1){left:10%;animation-duration:18s;}
.bg span:nth-child(2){left:20%;animation-duration:25s;}
.bg span:nth-child(3){left:30%;animation-duration:20s;}
.bg span:nth-child(4){left:40%;animation-duration:22s;}
.bg span:nth-child(5){left:50%;animation-duration:30s;}
.bg span:nth-child(6){left:60%;animation-duration:19s;}
.bg span:nth-child(7){left:70%;animation-duration:27s;}
.bg span:nth-child(8){left:80%;animation-duration:23s;}

@keyframes move{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-10vh) scale(1);
opacity:0;
}
}

/* GALLERY */
.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.gallery-grid img{
width:100%;
border-radius:12px;
cursor:pointer;
transition:.3s;
}
.gallery-grid img:hover{transform:scale(1.05)}

/* MODAL */
.modal{
display:none;
position:fixed;
z-index:999;
padding-top:60px;
left:0;top:0;
width:100%;height:100%;
background:rgb(70, 131, 184);
}
.modal-content{
margin:auto;
display:block;
max-width:90%;
max-height:90%;
}
.close{
position:absolute;
top:20px;
right:35px;
color:white;
font-size:40px;
cursor:pointer;
}

/* SPOTIFY */
.spotify-box{text-align:center;margin-top:15px}
.spotify-btn{
background:#1db954;color:white;border:none;
padding:12px 18px;font-size:18px;
border-radius:25px;cursor:pointer;
}
.spotify-menu{display:none;margin-top:10px}

/* BODY */
body{

/* NAV */

}

/* FOOTER */
footer{

color:white;
text-align:center;
padding:10px;
}

</style>
